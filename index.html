<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-sidebar { background: rgba(249, 250, 251, 0.95); backdrop-filter: blur(10px); }
        .dark .glass-sidebar { background: rgba(17, 24, 39, 0.95); }
        
        /* Smooth scrolling for chat */
        #chat-container { scroll-behavior: smooth; }

        /* Hide scrollbars but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Typing cursor animation */
        .typing::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #loading {
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: flex; items-center; justify-content: center; font-weight: 500;
        }
        .dark #loading { background: #111827; color: white; }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">

    <div id="loading">Loading Universal AI...</div>

    <div id="app" class="hidden flex min-h-screen relative">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden hidden"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 glass-sidebar border-r border-gray-200 dark:border-gray-800 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
            <div class="p-4 flex items-center justify-between">
                <button onclick="createNewChat()" class="flex-1 flex items-center justify-center gap-2 bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 py-3 px-4 rounded-full transition-all font-medium">
                    <span class="text-xl">+</span> New Chat
                </button>
                <button onclick="toggleSidebar()" class="lg:hidden ml-2 p-2">✕</button>
            </div>

            <div id="chat-history" class="flex-1 overflow-y-auto px-3 space-y-2 no-scrollbar">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800 space-y-2">
                <button onclick="openSettings()" class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg flex items-center gap-3">
                    ⚙️ Settings
                </button>
                <button onclick="toggleDarkMode()" class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg flex items-center gap-3">
                    <span id="theme-icon">🌙</span> Dark Mode
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 lg:ml-72 relative">
            <header class="h-16 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-4 sticky top-0 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md z-30">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-md">
                        ☰
                    </button>
                    <h1 class="font-semibold truncate max-w-[200px]" id="current-chat-title">New Chat</h1>
                </div>
                <div id="model-badge" class="text-xs font-mono bg-blue-100 dark:bg-blue-900/30 text-blue-600 px-2 py-1 rounded">
                    deepseek-r1
                </div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32">
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-50">
                    <div class="text-5xl">✨</div>
                    <h2 class="text-2xl font-semibold">How can I help you today?</h2>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 lg:left-72 bg-gradient-to-t from-white via-white dark:from-gray-900 dark:via-gray-900 to-transparent p-4">
                <div class="max-w-3xl mx-auto relative">
                    <textarea 
                        id="user-input"
                        rows="1"
                        placeholder="Message AI..."
                        class="w-full p-4 pr-12 rounded-2xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none resize-none shadow-sm"
                        oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"
                    ></textarea>
                    <button 
                        onclick="sendMessage()"
                        id="send-btn"
                        class="absolute right-3 bottom-3 p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-colors disabled:opacity-50"
                    >
                        <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </div>
                <p class="text-[10px] text-center mt-2 text-gray-500">AI may display inaccurate info. Check your API key in Settings.</p>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center hidden p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4">Settings</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-2 rounded border dark:bg-gray-700 dark:border-gray-600">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model Name</label>
                    <input type="text" id="model-input" placeholder="deepseek/deepseek-r1:free" class="w-full p-2 rounded border dark:bg-gray-700 dark:border-gray-600">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full p-2 rounded border dark:bg-gray-700 dark:border-gray-600 text-sm"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeSettings()" class="px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let state = {
            chats: JSON.parse(localStorage.getItem('ai_chats')) || [],
            currentChatId: null,
            apiKey: localStorage.getItem('ai_api_key') || '',
            model: localStorage.getItem('ai_model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('ai_system_prompt') || 'You are a helpful, concise assistant.',
            isDark: localStorage.getItem('ai_theme') === 'dark'
        };

        // --- Initialization ---
        function init() {
            if (state.isDark) document.documentElement.classList.add('dark');
            
            // UI Sync
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            document.getElementById('system-prompt-input').value = state.systemPrompt;
            document.getElementById('model-badge').innerText = state.model.split('/').pop();
            
            renderHistory();
            
            // Start fresh or load last chat
            if (state.chats.length > 0) {
                loadChat(state.chats[0].id);
            } else {
                createNewChat();
            }

            // Reveal App
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');

            // Handle Keyboard Enter
            document.getElementById('user-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        // --- Core Functions ---
        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const text = inputEl.value.trim();
            if (!text || !state.apiKey) {
                if (!state.apiKey) openSettings();
                return;
            }

            // UI Reset
            inputEl.value = '';
            inputEl.style.height = 'auto';
            document.getElementById('welcome-screen').classList.add('hidden');

            const chat = state.chats.find(c => c.id === state.currentChatId);
            
            // Add User Message
            const userMsg = { role: 'user', content: text };
            chat.messages.push(userMsg);
            if (chat.title === 'New Chat') chat.title = text.substring(0, 30) + '...';
            
            renderMessages();
            renderHistory();
            saveToStorage();

            // Prepare API Streaming
            const assistantMsgId = Date.now();
            chat.messages.push({ role: 'assistant', content: '', id: assistantMsgId });
            renderMessages();

            const container = document.getElementById('chat-container');
            const messageDiv = document.getElementById(`msg-${assistantMsgId}`);
            const contentDiv = messageDiv.querySelector('.msg-content');
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: [
                            { role: "system", content: state.systemPrompt },
                            ...chat.messages.filter(m => m.content).slice(-10) // Context window
                        ],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');
                    
                    for (const line of lines) {
                        const payload = line.replace(/^data: /, '');
                        if (payload === '[DONE]') break;
                        try {
                            const data = JSON.parse(payload);
                            const token = data.choices[0]?.delta?.content || "";
                            fullResponse += token;
                            contentDiv.innerHTML = marked.parse(fullResponse + '<span class="typing"></span>');
                            container.scrollTop = container.scrollHeight;
                        } catch (e) { /* silent catch for partial chunks */ }
                    }
                }

                // Finalize
                const finalMsg = chat.messages.find(m => m.id === assistantMsgId);
                finalMsg.content = fullResponse;
                contentDiv.innerHTML = marked.parse(fullResponse);
                saveToStorage();

            } catch (error) {
                contentDiv.innerHTML = `<span class="text-red-500">Error: ${error.message}. Check your API Key and Model.</span>`;
            }
        }

        // --- UI Logic ---
        function renderMessages() {
            const container = document.getElementById('chat-container');
            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (!chat) return;

            container.innerHTML = chat.messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300">
                    <div id="msg-${m.id || ''}" class="max-w-[85%] md:max-w-[70%] rounded-2xl px-4 py-3 ${
                        m.role === 'user' 
                        ? 'bg-blue-600 text-white rounded-br-none' 
                        : 'bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-100 rounded-bl-none'
                    }">
                        <div class="text-[10px] uppercase tracking-widest opacity-50 mb-1">${m.role}</div>
                        <div class="msg-content prose dark:prose-invert prose-sm sm:prose-base max-w-none">
                            ${m.content ? marked.parse(m.content) : '...'}
                        </div>
                    </div>
                </div>
            `).join('');
            
            if (chat.messages.length > 0) {
                document.getElementById('welcome-screen').classList.add('hidden');
            }
            container.scrollTop = container.scrollHeight;
        }

        function renderHistory() {
            const hist = document.getElementById('chat-history');
            hist.innerHTML = state.chats.map(chat => `
                <div onclick="loadChat('${chat.id}')" class="group relative flex items-center p-3 rounded-xl cursor-pointer transition-colors ${state.currentChatId === chat.id ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600' : 'hover:bg-gray-100 dark:hover:bg-gray-800'}">
                    <span class="truncate flex-1 text-sm font-medium">${chat.title}</span>
                    <button onclick="event.stopPropagation(); deleteChat('${chat.id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition-opacity">
                        🗑️
                    </button>
                </div>
            `).reverse().join('');
        }

        // --- Actions ---
        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: 'New Chat',
                messages: []
            };
            state.chats.push(newChat);
            state.currentChatId = newChat.id;
            saveToStorage();
            renderHistory();
            renderMessages();
            document.getElementById('welcome-screen').classList.remove('hidden');
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function loadChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            document.getElementById('current-chat-title').innerText = chat.title;
            renderMessages();
            renderHistory();
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function deleteChat(id) {
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) {
                state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
            }
            if (!state.currentChatId) createNewChat();
            saveToStorage();
            renderHistory();
            renderMessages();
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = !sb.classList.contains('-translate-x-full');
            
            if (isOpen) {
                sb.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                sb.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            }
        }

        function toggleDarkMode() {
            state.isDark = !state.isDark;
            document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').innerText = state.isDark ? '☀️' : '🌙';
            localStorage.setItem('ai_theme', state.isDark ? 'dark' : 'light');
        }

        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }

        function saveSettings() {
            state.apiKey = document.getElementById('api-key-input').value;
            state.model = document.getElementById('model-input').value || 'deepseek/deepseek-r1:free';
            state.systemPrompt = document.getElementById('system-prompt-input').value;
            
            localStorage.setItem('ai_api_key', state.apiKey);
            localStorage.setItem('ai_model', state.model);
            localStorage.setItem('ai_system_prompt', state.systemPrompt);
            
            document.getElementById('model-badge').innerText = state.model.split('/').pop();
            closeSettings();
        }

        function saveToStorage() {
            localStorage.setItem('ai_chats', JSON.stringify(state.chats));
        }

        // --- Run App ---
        window.onload = init;
        document.getElementById('sidebar-overlay').onclick = toggleSidebar;
    </script>
</body>
</html>
